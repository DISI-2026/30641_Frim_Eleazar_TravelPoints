    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  application:
    name: travelpoints-backend

  datasource:
    url: jdbc:postgresql://localhost:5433/travelpoints
    username: travelpoints_user
    password: travelpoints_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 12MB

