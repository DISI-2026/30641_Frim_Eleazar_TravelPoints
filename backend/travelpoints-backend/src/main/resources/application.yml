spring:
  application:
    name: travelpoints-backend

  datasource:
    url: jdbc:postgresql://localhost:5433/travelpoints
    username: travelpoints_user
    password: travelpoints_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

app:
  jwt:
    secret: ZmFjdWx0YXRlLXRyYXZlbHBvaW50cy1zZWNyZXQta2V5LXN1cGVyLWxvbmctbXVzdC1iZS1hdC1sZWFzdC02NC1ieXRlcy1mb3ItaHM1MTItYWxnb3JpdGhtLXh4eA==
    expiration-ms: 86400000
  storage:
    upload-dir: ./uploads
    audio-subdir: audio
    allowed-audio-extensions: mp3,wav